# =============================================================================
# TechTregu — Docker Compose Development Environment
#
# Spin up:
#   docker compose up -d
#
# Tear down:
#   docker compose down -v          (removes volumes)
#   docker compose down             (keeps volumes for reuse)
#
# The app connects to the MySQL container automatically via the service name
# "mysql" (MYSQL_HOST).  The server's bootstrap then creates the schema and
# tables on first startup.
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # MySQL 8
  # --------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: techtregu-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-rootpassword}
      MYSQL_DATABASE: techtregu

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # App (server + client dev servers)
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      target: base
    container_name: techtregu-app
    restart: unless-stopped

    ports:
      - "5000:5000"   # Express API server
      - "5173:5173"   # Vite dev server (proxies /api → localhost:5000)

    environment:
      # Database – connect via the mysql compose service
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rootpassword}
      MYSQL_DATABASE: techtregu

      # Server
      NODE_ENV: development
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_key_at_least_32_chars_long_xxx}

      # CORS — Vite dev-server origin
      CLIENT_URL: http://localhost:5173

    volumes:
      # Mount the entire project for live code reloading
      - .:/app
      # Keep container node_modules (don't let the host mount override them)
      - /app/node_modules
      - /app/client/node_modules
      - /app/server/node_modules

    depends_on:
      mysql:
        condition: service_healthy

# ------------------------------------------------------------------------------
# Persistent volumes
# ------------------------------------------------------------------------------
volumes:
  mysql_data:
    driver: local
